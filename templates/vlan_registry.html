{% extends "base.html" %}
{% block title %}VLAN 管理 — H3C Monitor{% endblock %}
{% block breadcrumb %}VLAN 管理{% endblock %}

{% block content %}

<div class="card mb-3">
    <div class="card-body">
        <div class="flex gap-3" style="flex-wrap:wrap;align-items:end">
            <div class="form-group mb-0" style="min-width:240px">
                <label class="form-label">选择设备</label>
                <select class="form-select" id="deviceSelect" onchange="onDeviceChange()">
                    <option value="">请选择设备</option>
                </select>
            </div>
            <button class="btn btn-primary" id="btnNew" disabled onclick="showVlanForm()">
                <i class="bi bi-plus-lg"></i> 新建 VLAN
            </button>
            <button class="btn btn-outline" id="btnRefresh" disabled onclick="loadVlans()">
                <i class="bi bi-arrow-clockwise"></i> 刷新
            </button>
        </div>
    </div>
</div>

<div class="card" id="vlanCard" style="display:none">
    <div class="card-header flex-between">
        <span><i class="bi bi-tag"></i> VLAN 列表</span>
        <span class="text-muted" style="font-size:12px" id="vlanCount"></span>
    </div>
    <div class="card-body" style="padding:0">
        <table class="table">
            <thead><tr><th>VLAN ID</th><th>名称</th><th>描述</th><th>操作</th></tr></thead>
            <tbody id="vlanTable">
                <tr class="table-empty"><td colspan="4">请选择设备</td></tr>
            </tbody>
        </table>
    </div>
</div>

<!-- 新建 VLAN 弹窗 -->
<div class="modal" id="vlanModal">
    <div class="card" style="min-width:400px">
        <div class="card-header flex-between">
            <span>新建 VLAN</span>
            <button class="btn btn-sm btn-outline" onclick="closeVlanForm()"><i class="bi bi-x-lg"></i></button>
        </div>
        <div class="card-body">
            <form id="vlanForm">
                <div class="form-group">
                    <label class="form-label">VLAN ID</label>
                    <input type="number" class="form-control" id="vlanId" min="1" max="4094" required placeholder="1-4094">
                </div>
                <div class="form-group">
                    <label class="form-label">名称</label>
                    <input type="text" class="form-control" id="vlanName" placeholder="如 Management">
                </div>
                <div class="form-group">
                    <label class="form-label">描述</label>
                    <input type="text" class="form-control" id="vlanDesc" placeholder="可选描述">
                </div>
                <div class="flex-between mt-2">
                    <button type="button" class="btn btn-outline" onclick="closeVlanForm()">取消</button>
                    <button type="submit" class="btn btn-primary">创建</button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;z-index:2000;background:rgba(0,0,0,0.5);align-items:center;justify-content:center}.modal.open{display:flex}</style>

{% endblock %}
{% block scripts %}
<script src="/static/js/vlan.js"></script>
{% endblock %}
