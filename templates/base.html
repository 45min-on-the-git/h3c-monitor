<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}H3C Monitor{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/static/js/api.js"></script>
    {% block head %}{% endblock %}
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar">
    <a href="/" class="sidebar-brand">
        <i class="bi bi-hdd-network"></i> H3C Monitor
    </a>
    <nav class="sidebar-nav">
        <div class="sidebar-section">监视</div>
        <a href="/" class="sidebar-link active" data-path="/">
            <i class="bi bi-speedometer2"></i> 监控总览
        </a>
        <a href="/alarms" class="sidebar-link" data-path="/alarms">
            <i class="bi bi-bell"></i> 告警中心
        </a>

        <div class="sidebar-section">管理</div>
        <a href="/devices" class="sidebar-link" data-path="/devices">
            <i class="bi bi-server"></i> 设备台账
        </a>
        <a href="/ipam" class="sidebar-link" data-path="/ipam">
            <i class="bi bi-diagram-3"></i> IP 地址管理
        </a>
        <a href="/config" class="sidebar-link" data-path="/config">
            <i class="bi bi-cloud-upload"></i> 配置备份
        </a>

        <div class="sidebar-section">控制</div>
        <a href="/acl" class="sidebar-link" data-path="/acl">
            <i class="bi bi-shield-check"></i> ACL 管理
        </a>
    </nav>
    <div class="sidebar-footer">
        <span>v0.1.0</span>
        <button id="themeToggle" title="切换主题">
            <i class="bi bi-moon-stars"></i>
        </button>
    </div>
</aside>

<!-- 顶栏 -->
<header class="topbar">
    <div class="topbar-left">
        <button class="mobile-menu-btn btn btn-sm btn-outline" onclick="document.querySelector('.sidebar').classList.toggle('open')">
            <i class="bi bi-list"></i>
        </button>
        <span>{% block breadcrumb %}{% endblock %}</span>
    </div>
    <div class="topbar-right">
        <a href="/alarms" class="alarm-indicator" id="alarmIndicator" title="告警">
            <i class="bi bi-bell"></i>
            <span class="badge bg-danger" style="display:none" id="alarmBadge">0</span>
        </a>
        <span class="topbar-clock" id="topbarClock"></span>
    </div>
</header>

<!-- 主内容区 -->
<main class="main-content">
    {% block content %}{% endblock %}
</main>

<script>
// 高亮当前导航
(function() {
    const path = window.location.pathname;
    document.querySelectorAll('.sidebar-link').forEach(link => {
        link.classList.toggle('active', link.getAttribute('data-path') === path);
    });
})();

// 告警轮询（30s）
let _lastAlarmCount = -1;
async function pollAlarms() {
    try {
        const data = await API.get('/api/alarms/count');
        const count = data?.active || 0;
        const badge = document.getElementById('alarmBadge');
        const indicator = document.getElementById('alarmIndicator');

        if (count > 0) {
            badge.textContent = count;
            badge.style.display = '';
            indicator.classList.add('active');
            // 新告警弹窗
            if (_lastAlarmCount >= 0 && count > _lastAlarmCount) {
                showAlarmToast(count, count - _lastAlarmCount);
            }
        } else {
            badge.style.display = 'none';
            indicator.classList.remove('active');
        }
        _lastAlarmCount = count;
    } catch(e) {}
}
function showAlarmToast(total, newCount) {
    if (typeof showToast === 'function') {
        showToast(`${newCount} 条新告警，共 ${total} 条活跃告警`, 'error');
    }
}
pollAlarms();
setInterval(pollAlarms, 30000);
</script>

{% block scripts %}{% endblock %}
</body>
</html>
